# ============================================================
#  tz.yaml  -  Personal information database
#
#  Edit with any text editor or quickSnapper.
#
#  Conventions (see also qs_data.toml / qs_data.ini):
#    - Entries may sit in a section (accounts: ...) or directly at the top
#      level without a section heading (name: TOMO). List the top-level
#      ones with  qs _  and the categorized ones with  qs .
#    - Masked fields:       use  _MASKED: <value>  instead of  _VALUE:
#                           Hidden on display, but copied to the clipboard
#                           correctly.
#    - Variants (short forms): an extra key inside a field becomes 'field.variant',
#      e.g. phone + short -> 'phone' and 'phone.short'.
#    - Environment vars:    { _ENV: COMPUTERNAME }   -> value from os.environ.
#                           '_ENV' may be a list: { _ENV: [COMPUTERNAME, HOSTNAME] }
#                           (first one set wins); optional '_DEFAULT:' as fallback.
#    - Built-in source:     { _SOURCE: hostname }  -> resolved portably via Python.
#                           (hostname, fqdn, username/user, platform, cwd)
#    - Internal references: "{accounts.ad_user}" or "{email}".
#                           IMPORTANT: the quotes are required in YAML - an
#                           unquoted {email} is parsed as a YAML mapping!
#    - Lists:               ip: internal: [a, b]  -> 'ip.internal' shows [a, b],
#                           'ip.internal[0]' / 'ip.internal[1]' single elements.
#                           IMPORTANT: quote list elements on the command
#                           line - qs "proxy.ip.internal[0]" - the quotes are
#                           required, [] is expanded by the shell otherwise.
#    - Nesting:             sections may nest (proxy: ip: internal: ...);
#                           keys become 'proxy.ip.internal'.
#    - Per-file settings:   an optional _LOCAL_SETTINGS section overrides the
#                           global config for THIS file only (keys: clipboard,
#                           show_masked, overwrite_warning, backup,
#                           backup_generations). Put it at the very top. Values
#                           for backup are none, implicit, all. Example:
#                               _LOCAL_SETTINGS:
#                                 clipboard: "yes"
#                                 show_masked: "no"
#                                 overwrite_warning: "yes"
#                                 backup: implicit
#                                 backup_generations: 3
#    - Multi-line values:   YAML block scalar with  |
# ============================================================


# Try
#        qs --db tz.yaml who
#        qs --db tz.yaml hostname
#        qs --db tz.yaml home

# -- Local settings (for this DB only) ------------------------
